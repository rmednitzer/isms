schema_version: 1
description: Incident significance classification for NISG 2026 § 32 and 
  internal handling
nisg2026_significance_thresholds:
  description: An incident is considered significant under NISG 2026 § 32(2) if 
    at least one of the following applies. This matches the criteria expected 
    under Impl Reg (EU) 2024/2690 for in-scope entity categories.
  criteria:
    - id: C1
      condition: serious operational disruption of the essential service
    - id: C2
      condition: material financial loss to the entity
    - id: C3
      condition: material or non-material damage to natural or legal persons
    - id: C4
      condition: affecting a large number of users
    - id: C5
      condition: cross-border impact (other Member States)
severity_matrix:
  low: minor impact, contained quickly, no external notification
  medium: contained but required more than routine effort; possible supervisory 
    interest
  high: significant impact; NISG 2026 § 32 reporting likely required
  critical: existential or sector-wide impact; NISG 2026 § 32 reporting certain;
    CISO-led response
response_times:
  cert_at_fruehwarnung: within 24 hours of becoming aware of a significant 
    cybersecurity incident (§ 32(3))
  cert_at_notification: within 72 hours of becoming aware (§ 32(4))
  cert_at_progress_report_on_request: upon supervisory authority request
  cert_at_final_report: within one month of the notification (§ 32(5))
  gdpr_dsb_notification: without undue delay, not later than 72 hours after 
    becoming aware, per GDPR Art. 33
  gdpr_data_subject: without undue delay where high risk, per GDPR Art. 34
