name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[dev]"
        working-directory: tooling

      - name: Lint with ruff
        run: ruff check tooling/ --config tooling/pyproject.toml

      - name: Run tests
        run: make test PYTHON=python

      - name: Run validators
        run: make validate PYTHON=python
