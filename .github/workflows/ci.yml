name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install jsonschema "ruamel.yaml>=0.18" python-dateutil requests lxml cryptography jinja2 pytest pytest-cov ruff

      - name: Lint with ruff
        run: ruff check tooling/ --config tooling/pyproject.toml

      - name: Run tests
        run: python -m pytest tooling/tests -v --tb=short

      - name: Validate frontmatter
        run: python tooling/validators/validate_frontmatter.py

      - name: Validate cross-references
        run: python tooling/validators/validate_crossrefs.py

      - name: Validate signatures
        run: python tooling/validators/validate_signatures.py

      - name: Validate supersession
        run: python tooling/validators/validate_supersession.py

      - name: Validate law references
        run: python tooling/validators/validate_law_references.py

      - name: Validate calendar
        run: python tooling/validators/validate_calendar.py

      - name: Validate bilingual
        run: python tooling/validators/validate_bilingual.py
