version = 1
SPDX-PackageName = "isms"
SPDX-PackageSupplier = "Roman Mednitzer"
SPDX-PackageDownloadLocation = "https://github.com/rmednitzer/isms"

# Default licence and copyright for repository content. This file follows the
# REUSE 3.3 specification (https://reuse.software/spec/). Per-file SPDX headers
# may override these defaults; see LIMITATIONS.md L6 for the retrofit status.
#
# Note: the Apache-2.0 licence on this repository covers the framework
# (template/, tooling/, docs/, framework-refs/). Instance-specific content
# under instance/ is confidential to the deploying organisation regardless of
# the framework licence; see docs/document-control.md.

[[annotations]]
path = "**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Copyright (c) Roman Mednitzer and contributors"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = ["LICENSE", "NOTICE"]
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) Roman Mednitzer and contributors"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = "CLAUDE.md"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) Roman Mednitzer and contributors"
SPDX-License-Identifier = "Apache-2.0"
